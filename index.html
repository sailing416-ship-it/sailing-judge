export default function SailingJudgeApp() {
  const [activeTab, setActiveTab] = useState("home");
  const [currentStep, setCurrentStep] = useState(0);
  const [checkedItems, setCheckedItems] = useState({});
  const [hearingStarted, setHearingStarted] = useState(false);
  const [messages, setMessages] = useState([
    {
      role: "assistant",
      content: "Welcome. I am your sailing judge assistant, loaded with the complete 2025-2028 Racing Rules of Sailing and the World Sailing Case Book 2025-2028.\n\nI can help you:\n- Apply rules to specific incidents\n- Find relevant Casebook cases\n- Guide you through hearing procedures\n- Interpret definitions and rule interactions\n\nDescribe an incident, ask about a procedure, or cite a rule number to get started. I will always reference specific rule numbers and case numbers in my answers.",
    },
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const messagesEndRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const toggleCheck = (stepId, itemIndex) => {
    const key = `${stepId}-${itemIndex}`;
    setCheckedItems((prev) => ({ ...prev, [key]: !prev[key] }));
  };

  const getStepCompletion = (stepId, itemCount) => {
    let count = 0;
    for (let i = 0; i < itemCount; i++) {
      if (checkedItems[`${stepId}-${i}`]) count++;
    }
    return count;
  };

  const sendMessage = async (msgText) => {
    const text = msgText || input;
    if (!text.trim() || loading) return;
    const userMsg = { role: "user", content: text };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput("");
    setLoading(true);

    try {
      const systemPrompt = SYSTEM_PROMPT;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: systemPrompt,
          messages: newMessages.map((m) => ({ role: m.role, content: m.content })),
        }),
      });

// API Key wrapper component
function AppWithAuth() {
  const [apiKey, setApiKey] = React.useState(() => {
    try { return localStorage.getItem("sailing_judge_api_key") || ""; } catch(e) { return ""; }
  });
  const [inputKey, setInputKey] = React.useState("");
  const [error, setError] = React.useState("");
  const [showHelp, setShowHelp] = React.useState(false);

  const handleSave = () => {
    const key = inputKey.trim();
    if (!key.startsWith("sk-ant-")) {
      setError("Please enter a valid Anthropic API key (starts with sk-ant-)");
      return;
    }
    try { localStorage.setItem("sailing_judge_api_key", key); } catch(e) {}
    setApiKey(key);
  };

  // Inject API key into fetch calls by monkey-patching fetch
  React.useEffect(() => {
    if (!apiKey) return;
    const originalFetch = window._originalFetch || window.fetch;
    window._originalFetch = originalFetch;
    window.fetch = function(url, options) {
      if (typeof url === "string" && url.includes("anthropic.com")) {
        options = options || {};
        options.headers = {
          ...options.headers,
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-calls": "true",
        };
      }
      return originalFetch(url, options);
    };
    return () => { if (window._originalFetch) window.fetch = window._originalFetch; };
  }, [apiKey]);

  if (!apiKey) {
    return (
      <div className="api-screen">
        <div className="api-card">
          <div className="api-seal">⚓</div>
          <div className="api-title">Sailing Judge Assistant</div>
          <div className="api-subtitle">Racing Rules Guidance Tool</div>
          <div className="api-edition">2025–2028 RRS · World Sailing Case Book · Sail Canada Prescriptions</div>
          <div style={{marginTop:"6px",fontFamily:"'Crimson Pro',serif",fontSize:"12px",color:"#3a5878"}}>https://sailing416-ship-it.github.io/sailing-judge/</div>

          <div className="api-divider" />

          <div className="api-label">Enter Your Anthropic API Key</div>
          <input
            className="api-input"
            type="password"
            placeholder="sk-ant-api03-..."
            value={inputKey}
            onChange={e => { setInputKey(e.target.value); setError(""); }}
            onKeyDown={e => e.key === "Enter" && handleSave()}
          />
          {error && <div style={{color:"#c05030", fontSize:"13px", marginBottom:"12px", textAlign:"left"}}>{error}</div>}
          <button className="api-btn" onClick={handleSave}>Launch Application →</button>

          <button
            onClick={() => setShowHelp(!showHelp)}
            style={{
              width:"100%", marginTop:"12px", background:"transparent",
              border:"1px solid #2a4870", borderRadius:"8px", padding:"10px",
              fontFamily:"'Crimson Pro',serif", fontSize:"14px", color:"#7a96b4",
              cursor:"pointer", transition:"all 0.2s",
              display:"flex", alignItems:"center", justifyContent:"center", gap:"8px"
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="#b8841e";e.currentTarget.style.color="#b8841e"}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#2a4870";e.currentTarget.style.color="#7a96b4"}}
          >
            <span>{showHelp ? "▲" : "▼"}</span>
            {showHelp ? "Hide" : "❓ What is an API key and how do I get one?"}
          </button>

          {showHelp && (
            <div style={{
              marginTop:"14px", background:"#08111f", border:"1px solid #1a3050",
              borderRadius:"10px", padding:"20px", textAlign:"left",
              fontFamily:"'Crimson Pro',serif", fontSize:"14px", color:"#c0d0e4", lineHeight:"1.8"
            }}>
              <div style={{fontFamily:"'Playfair Display',serif", fontSize:"16px", fontWeight:"700", color:"#b8841e", marginBottom:"14px"}}>
                How to Get Your API Key — 3 Steps
              </div>

              {[
                {
                  n:"1",
                  title:"Create a free Anthropic account",
                  body:<>Go to <a href="https://console.anthropic.com" target="_blank" style={{color:"#b8841e"}}>console.anthropic.com</a> and sign up. It is free to register.</>
                },
                {
                  n:"2",
                  title:'Click "API Keys" then "Create Key"',
                  body:'In the left menu, choose API Keys. Click the Create Key button. Give it any name (e.g. "Sailing Judge App"). Copy the key — it starts with sk-ant-'
                },
                {
                  n:"3",
                  title:"Paste it above and click Launch",
                  body:"Paste the key into the field above and click Launch Application. The app saves it on this device — you only need to do this once."
                }
              ].map(step => (
                <div key={step.n} style={{display:"flex", gap:"14px", marginBottom:"14px", alignItems:"flex-start"}}>
                  <div style={{
                    width:"28px", height:"28px", flexShrink:0,
                    background:"linear-gradient(135deg,#b8841e,#9a6e10)",
                    borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center",
                    fontFamily:"'Playfair Display',serif", fontWeight:"700", fontSize:"14px", color:"#08111f"
                  }}>{step.n}</div>
                  <div>
                    <div style={{fontWeight:"600", color:"#e2d9c8", marginBottom:"2px"}}>{step.title}</div>
                    <div style={{color:"#7a96b4"}}>{step.body}</div>
                  </div>
                </div>
